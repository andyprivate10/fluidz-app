[build]
  command = "npm run build"
  publish = "dist"

# Landing page — served as static HTML before SPA catch-all
[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/pro"
  to = "/pro.html"
  status = 200

# SPA catch-all — must be LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
